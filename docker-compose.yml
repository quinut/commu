version: '3.8'

services:
  commu-frontend:
    build:
      context: ./frontend
      args:
        # Vite 배포 환경 구성을 위한 Supabase 환경변수 매핑
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: commu-app
    ports:
      # 호스트의 80 포트를 컨테이너의 80 포트(Nginx)로 매핑
      - "80:80"
    restart: always
