version: '3.8'

services:
  commu-frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: commu-frontend
    ports:
      - "80:80"
    restart: always

  commu-backend:
    build:
      context: ./backend
    container_name: commu-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Elysia 백엔드에서 환경변수로 Supabase 연결이 필요한 경우를 대비해 루트 .env에서 주입합니다.
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_KEY=${VITE_SUPABASE_ANON_KEY}
    restart: always
